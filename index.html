<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Demo Bank</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
background:linear-gradient(135deg,#081225,#0f3460,#1f6feb);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.bg{
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,0.08);
border-radius:50%;
filter:blur(100px);
animation:move 8s infinite alternate;
}

@keyframes move{
from{
transform:translate(-150px,-100px);
}
to{
transform:translate(150px,100px);
}
}

.card{
position:relative;
width:340px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 0 30px rgba(0,0,0,0.4);
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:28px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.12);
color:white;
font-size:15px;
}

input::placeholder{
color:#ddd;
}

button{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:14px;
background:#2f7df6;
color:white;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
background:#5597ff;
}

.balance{
font-size:42px;
font-weight:bold;
text-align:center;
margin:20px 0;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.history{
margin-top:15px;
max-height:120px;
overflow:auto;
padding:10px;
border-radius:14px;
background:rgba(0,0,0,0.2);
}

.hidden{
display:none;
}

.small{
text-align:center;
margin-top:10px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card" id="loginPage">

<div class="logo">Nova Demo Bank</div>

<input id="loginUser" placeholder="Username">

<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<button onclick="showRegister()">
Create Account
</button>

<div class="small">
Demo Banking Experience
</div>

</div>

<div class="card hidden" id="registerPage">

<div class="logo">Create Account</div>

<input id="newUser" placeholder="Username">

<input id="newPass" type="password" placeholder="Password">

<button onclick="createAccount()">
Create Account
</button>

</div>

<div class="card hidden" id="dashboard">

<div class="logo">Dashboard</div>

<div class="balance">
₹<span id="money">0</span>
</div>

<input id="depositAmount" type="number" placeholder="Deposit Amount">

<button onclick="deposit()">
Deposit Money
</button>

<input id="transferUser" placeholder="Receiver Username">

<input id="transferAmount" type="number" placeholder="Transfer Amount">

<button onclick="transfer()">
Transfer Money
</button>

<button onclick="logout()">
Logout
</button>

<div class="history" id="history">
Transactions:
</div>

</div>

<script>

let balance=0;

function showRegister(){

document.getElementById("loginPage").classList.add("hidden");

document.getElementById("registerPage").classList.remove("hidden");

}

function createAccount(){

let user=document.getElementById("newUser").value;

let pass=document.getElementById("newPass").value;

localStorage.setItem("user",user);

localStorage.setItem("pass",pass);

alert("Account Created Successfully");

document.getElementById("registerPage").classList.add("hidden");

document.getElementById("loginPage").classList.remove("hidden");

}

function login(){

let user=document.getElementById("loginUser").value;

let pass=document.getElementById("loginPass").value;

if(user==="admin" && pass==="admin123"){

alert("Admin Login Success");

return;

}

if(
user===localStorage.getItem("user")
&&
pass===localStorage.getItem("pass")
){

document.getElementById("loginPage").classList.add("hidden");

document.getElementById("dashboard").classList.remove("hidden");

}
else{

alert("Wrong Username or Password");

}

}

function deposit(){

let amt=Number(document.getElementById("depositAmount").value);

balance+=amt;

document.getElementById("money").innerHTML=balance;

addHistory("Deposited ₹"+amt);

}

function transfer(){

let user=document.getElementById("transferUser").value;

let amt=Number(document.getElementById("transferAmount").value);

if(amt>balance){

alert("Insufficient Balance");

return;

}

balance-=amt;

document.getElementById("money").innerHTML=balance;

addHistory("Transferred ₹"+amt+" to "+user);

alert("Transfer Successful");

}

function addHistory(text){

document.getElementById("history").innerHTML += "<br><br>"+text;

}

function logout(){

document.getElementById("dashboard").classList.add("hidden");

document.getElementById("loginPage").classList.remove("hidden");

}

</script>

</body>
</html>
